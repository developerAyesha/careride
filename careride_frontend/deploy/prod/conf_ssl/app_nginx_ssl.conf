server {
    server_name www.api.careride.com;
    return 301 https://api.careride.com$request_uri;
}
server {
    listen 443 ssl http2;
#    listen [::]:443 ssl http2;
    server_name api.careride.com;
    charset utf-8;

    ssl on;
    ssl_certificate /etc/nginx/conf.d/careride.com/server.crt;
    ssl_certificate_key /etc/nginx/conf.d/careride.com/server.key;

    client_max_body_size 100m;

    location / {
        access_log off;
        proxy_pass http://node_backend:3000;
        # proxy_pass http://carer-LoadB-L0I4P1PL53T4-0bd2fb0612ea7ab0.elb.us-west-1.amazonaws.com:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
    }
}

server {
    listen 80;
    server_name api.careride.com;
    rewrite ^ https://$host$request_uri? permanent;
}

server {
    listen 443 ssl http2;
#    listen [::]:443 ssl http2;
    server_name careride.com www.careride.com;
    charset utf-8;

    ssl on;
    ssl_certificate /etc/nginx/conf.d/careride.com/server.crt;
    ssl_certificate_key /etc/nginx/conf.d/careride.com/server.key;

    client_max_body_size 100m;

    if ($http_host = "www.careride.com") {
         rewrite ^ https://careride.com$request_uri permanent;
    }

    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name careride.com www.careride.com;
    rewrite ^ https://careride.com$request_uri? permanent;
}