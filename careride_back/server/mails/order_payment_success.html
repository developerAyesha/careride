Payment received for CareRide booking #{order_id}
<div style="font-family: Arial, sans-serif; color: #1a2a2a; max-width: 600px;">
  <p>Hi {client_name},</p>
  <p>We have received your payment of <strong>${price}</strong> for booking #{order_id}. Your ride is confirmed.</p>
  <ul style="list-style: none; padding: 0;">
    <li><strong>Pickup:</strong> {point_from}</li>
    <li><strong>Destination:</strong> {point_to}</li>
    <li><strong>Date &amp; time:</strong> {order_date}</li>
    <li><strong>Provider:</strong> {vendor_name}</li>
  </ul>
  <p><a href="{site}/ride/step-6">View ride details</a></p>
</div>
