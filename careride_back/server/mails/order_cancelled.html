CareRide booking #{order_id} has been cancelled
<div style="font-family: Arial, sans-serif; color: #1a2a2a; max-width: 600px;">
  <p>Hi {recipient_name},</p>
  <p>Booking #{order_id} has been cancelled{cancel_by_text}.</p>
  {cancel_reason_block}
  <ul style="list-style: none; padding: 0;">
    <li><strong>Pickup:</strong> {point_from}</li>
    <li><strong>Destination:</strong> {point_to}</li>
    <li><strong>Date &amp; time:</strong> {order_date}</li>
  </ul>
  <p style="color: #666; font-size: 12px;">If you have questions, contact CareRide support.</p>
</div>
